<!DOCTYPE html>
<html>
<head>
  <title>Hashtag Trend Dashboard</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* KPI CARDS */
    .kpi-container {
      display: flex;
      justify-content: space-around;
      margin-bottom: 25px;
    }

    .kpi {
      background: white;
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .kpi h3 {
      margin: 5px 0;
      color: #555;
    }

    .kpi p {
      font-size: 20px;
      font-weight: bold;
      margin: 0;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .chart-box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
    }
  </style>

  <script>
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(drawCharts);

    function drawCharts() {

      // ✅ DATA (converted date properly)
      var data = google.visualization.arrayToDataTable([
       ['Date','Hashtag','Posts','Likes','Retweets','Engagement'],

[new Date(2025,2,3),'#100DaysOfCode',276,1656,1104,2760],
[new Date(2025,2,9),'#Python',421,6736,2105,8841],
[new Date(2025,0,14),'#Analytics',293,1465,1172,2637],
[new Date(2025,1,19),'#DeepLearning',280,3360,2240,5600],
[new Date(2025,2,22),'#AI',396,7128,792,7920],
[new Date(2025,2,17),'#AI',86,602,258,860],
[new Date(2025,1,4),'#DeepLearning',149,1788,1043,2831],
[new Date(2025,0,6),'#Tech',498,3486,996,4482],
[new Date(2025,2,30),'#MachineLearning',255,4590,2040,6630],
[new Date(2025,2,18),'#DataScience',79,1580,237,1817],
[new Date(2025,2,30),'#Python',272,5440,816,6256],
[new Date(2025,0,16),'#DeepLearning',243,1944,1701,3645],
[new Date(2025,0,26),'#Coding',346,4152,3460,7612],
[new Date(2025,0,3),'#BigData',260,5200,780,5980],
[new Date(2025,2,14),'#Python',63,315,126,441],
[new Date(2025,0,22),'#AI',53,795,159,954],
[new Date(2025,1,10),'#Tech',473,5676,2365,8041],
[new Date(2025,1,7),'#DataScience',325,1950,1300,3250],
[new Date(2025,2,6),'#Python',313,3443,2504,5947],
[new Date(2025,2,23),'#Python',71,1278,568,1846],
[new Date(2025,1,9),'#Coding',460,5520,2760,8280],
[new Date(2025,1,20),'#AI',100,800,600,1400],
[new Date(2025,0,28),'#Analytics',313,5947,2817,8764],
[new Date(2025,2,10),'#DeepLearning',275,2475,2200,4675],
[new Date(2025,1,21),'#Python',55,275,440,715],
[new Date(2025,1,21),'#Analytics',99,1188,891,2079],
[new Date(2025,1,21),'#DeepLearning',264,2112,528,2640],
[new Date(2025,0,9),'#DataScience',429,2574,1287,3861],
[new Date(2025,2,11),'#AI',299,4186,2691,6877],
[new Date(2025,1,12),'#BigData',198,1386,792,2178],
[new Date(2025,2,25),'#Coding',133,1064,798,1862],
[new Date(2025,1,1),'#Python',472,5664,2360,8024],
[new Date(2025,3,1),'#Tech',491,3928,1473,5401],
[new Date(2025,0,7),'#100DaysOfCode',328,1968,2624,4592],
[new Date(2025,2,29),'#DataScience',189,1323,1323,2646],
[new Date(2025,0,27),'#BigData',412,5768,824,6592],
[new Date(2025,1,27),'#Tech',395,2370,3555,5925],
[new Date(2025,2,23),'#Tech',173,1038,692,1730],
[new Date(2025,0,25),'#Analytics',249,2988,747,3735],
[new Date(2025,2,5),'#MachineLearning',444,3996,4440,8436],
[new Date(2025,2,26),'#DeepLearning',347,3470,1735,5205],
[new Date(2025,1,1),'#BigData',182,2730,728,3458],
[new Date(2025,1,24),'#100DaysOfCode',469,5159,3283,8442],
[new Date(2025,1,23),'#Python',213,4047,852,4899],
[new Date(2025,2,30),'#Analytics',313,3443,3130,6573],
[new Date(2025,1,25),'#DataScience',317,2219,2536,4755],
[new Date(2025,1,18),'#DeepLearning',295,5900,1475,7375],
[new Date(2025,0,17),'#Analytics',53,530,159,689],
[new Date(2025,2,3),'#BigData',319,6380,957,7337],
[new Date(2025,2,9),'#AI',176,1056,880,1936],
[new Date(2025,0,30),'#AI',122,1830,366,2196],
[new Date(2025,0,31),'#BigData',448,7616,3136,10752],
[new Date(2025,0,24),'#DataScience',421,3368,2947,6315]
]);


      // ================= KPI CALC =================
      let totalPosts = 0, totalLikes = 0, totalEngagement = 0;

      for (let i = 0; i < data.getNumberOfRows(); i++) {
        totalPosts += data.getValue(i, 2);
        totalLikes += data.getValue(i, 3);
        totalEngagement += data.getValue(i, 5);
      }

      document.getElementById('posts').innerText = totalPosts;
      document.getElementById('likes').innerText = totalLikes;
      document.getElementById('engagement').innerText = totalEngagement;

      // ================= PIE =================
      var grouped = google.visualization.data.group(
        data,
        [1],
        [{'column': 2, 'aggregation': google.visualization.data.sum, 'type': 'number'}]
      );

      new google.visualization.PieChart(document.getElementById('pie'))
        .draw(grouped, {
          title: 'Hashtag Distribution',
          pieHole: 0.4
        });

      // ================= BAR =================
      new google.visualization.ColumnChart(document.getElementById('bar'))
        .draw(grouped, {
          title: 'Total Posts per Hashtag'
        });

      // ================= SCATTER =================
var scatterData = new google.visualization.DataView(data);
scatterData.setColumns([2, 3]); // ONLY numeric columns: Posts, Likes

new google.visualization.ScatterChart(document.getElementById('scatter'))
  .draw(scatterData, {
    title: 'Posts vs Likes',
    hAxis: { title: 'Posts' },
    vAxis: { title: 'Likes' },
    pointSize: 6,
    legend: 'none'
  });

      // ================= LINE =================
      var trend = google.visualization.data.group(
        data,
        [0],
        [{'column': 2, 'aggregation': google.visualization.data.sum, 'type': 'number'}]
      );

      new google.visualization.LineChart(document.getElementById('line'))
        .draw(trend, {
          title: 'Posts Over Time',
          hAxis: {format: 'MMM dd'}
        });
    }
  </script>
</head>

<body>

<h2>📊 Hashtag Trend Analysis Dashboard</h2>

<!-- KPI CARDS -->
<div class="kpi-container">
  <div class="kpi">
    <h3>Total Posts</h3>
    <p id="posts">0</p>
  </div>
  <div class="kpi">
    <h3>Total Likes</h3>
    <p id="likes">0</p>
  </div>
  <div class="kpi">
    <h3>Total Engagement</h3>
    <p id="engagement">0</p>
  </div>
</div>

<!-- CHART GRID -->
<div class="grid">
  <div id="pie" class="chart-box"></div>
  <div id="bar" class="chart-box"></div>
  <div id="scatter" class="chart-box"></div>
  <div id="line" class="chart-box"></div>
</div>

</body>
</html>
